services:
  prometheus:
    image: prom/prometheus:latest
    container_name: graduation-project-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "19090:9090"
    networks:
      - graduation-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: graduation-project-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${EDURAG_GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${EDURAG_GRAFANA_ADMIN_PASSWORD:-demo-grafana-pass-change-me}
    volumes:
      - ./ops/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./ops/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "13000:3000"
    networks:
      - graduation-network
    restart: unless-stopped

networks:
  graduation-network:
    external: true
    name: graduation-project_graduation-network
