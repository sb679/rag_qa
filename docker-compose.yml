services:
  # MySQL 基础设施
  mysql:
    image: mysql:8.0.31
    container_name: graduation-project-mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${EDURAG_MYSQL_ROOT_PASSWORD:-demo-mysql-root-change-me}
      MYSQL_DATABASE: subjects_kg
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - graduation-network
    restart: unless-stopped

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: graduation-project-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${EDURAG_MINIO_ROOT_USER:-demo-minio-user}
      MINIO_ROOT_PASSWORD: ${EDURAG_MINIO_ROOT_PASSWORD:-demo-minio-password-change-me}
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data
    networks:
      - graduation-network
    restart: unless-stopped

  # 后端服务
  backend:
    build:
      context: ./rag_qa
      dockerfile: web/Dockerfile.backend
    container_name: graduation-project-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - EDURAG_MYSQL_HOST=mysql
      - EDURAG_MYSQL_PORT=3306
      - EDURAG_MYSQL_USER=root
      - EDURAG_MYSQL_PASSWORD=${EDURAG_MYSQL_ROOT_PASSWORD:-demo-mysql-root-change-me}
      - EDURAG_MYSQL_DATABASE=subjects_kg
      - EDURAG_STORAGE_BACKEND=minio
      - EDURAG_MINIO_ENDPOINT=minio:9000
      - EDURAG_MINIO_ACCESS_KEY=${EDURAG_MINIO_ROOT_USER:-demo-minio-user}
      - EDURAG_MINIO_SECRET_KEY=${EDURAG_MINIO_ROOT_PASSWORD:-demo-minio-password-change-me}
      - EDURAG_MINIO_BUCKET=edurag-knowledge
      - EDURAG_MINIO_SECURE=false
    networks:
      - graduation-network
    volumes:
      - ./rag_qa:/app

  # 前端服务
  frontend:
    build:
      context: ./rag_qa/web/frontend
      dockerfile: Dockerfile
    container_name: graduation-project-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://backend:8000
    networks:
      - graduation-network

volumes:
  mysql-data:
  minio-data:

networks:
  graduation-network:
    driver: bridge
