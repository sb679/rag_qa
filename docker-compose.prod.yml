services:
  mysql:
    environment:
      MYSQL_ROOT_PASSWORD: ${EDURAG_MYSQL_ROOT_PASSWORD:?set EDURAG_MYSQL_ROOT_PASSWORD}
    ports: []

  minio:
    environment:
      MINIO_ROOT_USER: ${EDURAG_MINIO_ROOT_USER:?set EDURAG_MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${EDURAG_MINIO_ROOT_PASSWORD:?set EDURAG_MINIO_ROOT_PASSWORD}
    ports: []

  backend:
    environment:
      - EDURAG_MYSQL_PASSWORD=${EDURAG_MYSQL_ROOT_PASSWORD:?set EDURAG_MYSQL_ROOT_PASSWORD}
      - EDURAG_MINIO_ACCESS_KEY=${EDURAG_MINIO_ROOT_USER:?set EDURAG_MINIO_ROOT_USER}
      - EDURAG_MINIO_SECRET_KEY=${EDURAG_MINIO_ROOT_PASSWORD:?set EDURAG_MINIO_ROOT_PASSWORD}
    restart: always

  frontend:
    restart: always
